# .gitlab-ci.yml
stages:
  - build-base
  - build-train
  - test-train
  - promote-train
  - notify

variables:
  HARBOR_REGISTRY: "harbor.intp.me"
  HARBOR_PROJECT: "images"         
  BASE_IMAGE_NAME: "base"           
  TRAIN_IMAGE_NAME: "train"         
  AWS_REGION: "ap-northeast-2"
  ECR_ENDPOINT: "ECR_ENDPOINT_PLACEHOLDER"
  ECR_API_URI: "ECR_ENDPOINT_PLACEHOLDER/inference-api"
  MINIO_ENDPOINT: "http://minio-api.minio-tenant.svc.cluster.local:9000"

before_script:
  - echo "--- [$(date)] '${CI_JOB_NAME}' 작업을 시작합니다. ---"

# ==============================================================================
# [동작 1] 학습 베이스 이미지 빌드 파이프라인 (오직 환경 준비 시에만 단독 실행)
# ==============================================================================
build-base-image:
  stage: build-base
  image:
    name: harbor.intp.me/library/kaniko-executor:debug
    entrypoint: [""]
  script:
    - |
      echo "[LOG] Harbor 인증 수립 및 Kaniko 베이스 이미지 빌드 시작..."
      mkdir -p /kaniko/.docker
      echo '{"credsStore":"ecr-login"}' > /kaniko/.docker/config.json
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile.build" \
        --destination "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${BASE_IMAGE_NAME}:latest" \
        --registry-mirror=index.docker.io=harbor.intp.me/docker-hub
  tags:
    -  gpu-worker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - Dockerfile.build
        - requirements.txt
    - if: '$TRIGGER_PHASE == "build-base"'

# ==============================================================================
# [동작 2] 학습 완료 후 서빙 이미지 빌드, 검사 및 ECR 이송 파이프라인 (릴리즈 시 단독 실행)
# ==============================================================================

# 2-A. 패키징 단계 (MinIO 모델 다운로드 + Kaniko 서빙 이미지 빌드)
build-serving-image:
  stage: build-train
  image:
    name: harbor.intp.me/library/kaniko-executor:debug
    entrypoint: [""]
  script:
    - |
      echo "[LOG] MinIO 클라이언트(mc) 설치 및 모델 아티팩트 다운로드..."
      curl -k -fsSL -o /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc
      chmod +x /tmp/mc
      /tmp/mc alias set minio "${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"
      
      # MinIO artifacts/ 버킷에 저장된 최신 모델 파일을 서빙용 컨텍스트 내부로 복사
      mkdir -p "${CI_PROJECT_DIR}/services/inference-api/model-artifacts"
      /tmp/mc cp --recursive "minio/artifacts/models/latest/" "${CI_PROJECT_DIR}/services/inference-api/model-artifacts/"
      
      echo "[LOG] Harbor 인증 수립 및 Kaniko 서빙 이미지 빌드 시작..."
      mkdir -p /kaniko/.docker
      echo '{"credsStore":"ecr-login"}' > /kaniko/.docker/config.json
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/services/inference-api" \
        --dockerfile "${CI_PROJECT_DIR}/services/inference-api/Dockerfile" \
        --destination "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${TRAIN_IMAGE_NAME}:${CI_COMMIT_REF_NAME}" \
        --destination "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${TRAIN_IMAGE_NAME}:latest" \
        --registry-mirror=index.docker.io=harbor.intp.me/docker-hub
  tags:
    -  gpu-worker
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$TRIGGER_PHASE == "release-train"'

# 2-B. 검사 단계 (Trivy 사설 오프라인 스캔)
scan-serving-image:
  stage: test-train
  image:
    name: harbor.intp.me/docker-hub/aquasec/trivy:latest
    entrypoint: [""]
  script:
    - |
      echo "[LOG] 사설 이미지 보안 취약점 진단 -> /images/train"
      trivy image --severity HIGH,CRITICAL --exit-code 0 "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${TRAIN_IMAGE_NAME}:${CI_COMMIT_REF_NAME}"
  tags:
    -  gpu-worker
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$TRIGGER_PHASE == "release-train"'

# 2-C. 이송 단계 (AWS ECR 전송 및 GitOps 갱신)
promote-to-ecr:
  stage: promote-train
  image: harbor.intp.me/infra/mlops-tools:latest
  script:
    - |
      echo "[LOG] AWS ECR 로그인 및 이미지 이송(Promotion) 시작..."
      aws ecr get-login-password --region "${AWS_REGION}" | skopeo login --username AWS --password-stdin "${ECR_ENDPOINT}"
      
      # Harbor 사설 이미지(/images/train)를 AWS ECR로 정밀 복사
      skopeo copy --all --src-tls-verify=false "docker://${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${TRAIN_IMAGE_NAME}:${CI_COMMIT_REF_NAME}" "docker://${ECR_API_URI}:${CI_COMMIT_REF_NAME}"
      skopeo copy --all --src-tls-verify=false "docker://${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${TRAIN_IMAGE_NAME}:${CI_COMMIT_REF_NAME}" "docker://${ECR_API_URI}:latest"

      echo "[LOG] 공용 GitHub GitOps 저장소 클론 및 태그 업데이트..."
      git clone "https://Seungmin-Jeong2001:${GITHUB_PAT}@github.com/SGS-Strategy/hybrid-ai-serving-platform.git" github-repo
      cd github-repo
      sed -i "s|image: .*/inference-api:.*|image: ${ECR_API_URI}:${CI_COMMIT_REF_NAME}|g" public/k8s/serving/predictive-model/pdm-isvc.yaml

      git config --global user.email "${GIT_USER_EMAIL}"
      git config --global user.name "GitLab-CI-Bridge-Bot"
      git add public/k8s/serving/predictive-model/pdm-isvc.yaml
      git commit -m "chore(ops): [사설 빌드 성공] ECR 이미지 및 GitOps 동기화 완료 [${CI_COMMIT_REF_NAME}] [skip ci]" || echo "No changes to commit"
      git push origin HEAD
  tags:
    -  gpu-worker
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$TRIGGER_PHASE == "release-train"'

# ==============================================================================
# 슬랙 통합 알림 제어 (성공/실패 분기 처리)
# ==============================================================================
notify-success:
  stage: notify
  image: harbor.intp.me/docker-hub/library/ubuntu:latest
  when: on_success
  tags:
    -  gpu-worker
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$TRIGGER_PHASE == "release-train"'
    - if: '$TRIGGER_PHASE == "build-base"'
  script:
    - |
      apt-get update -qq && apt-get install -y -qq curl
      curl -X POST -H 'Content-type: application/json' \
        --data "{
          \"attachments\": [
            {
              \"fallback\": \"[성공] 파이프라인 완료\",
              \"color\": \"good\",
              \"pretext\": \"✅ *파이프라인 성공 알림*\",
              \"title\": \"[성공] $CI_PROJECT_NAME 작업 완료\",
              \"title_link\": \"$CI_PIPELINE_URL\",
              \"text\": \"요청하신 작업(베이스 이미지 빌드 또는 최종 ECR 적재 및 GitOps 동기화)이 사설망 가상 선로를 거쳐 성공적으로 완료되었습니다.\",
              \"footer\": \"Hybrid-Bridge System\",
              \"ts\": $(date +%s)
            }
          ]
        }" $SLACK_WEBHOOK_URL

notify-failure:
  stage: notify
  image: harbor.intp.me/docker-hub/library/ubuntu:latest
  when: on_failure
  tags:
    -  gpu-worker
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$TRIGGER_PHASE == "release-train"'
    - if: '$TRIGGER_PHASE == "build-base"'
  script:
    - |
      apt-get update -qq && apt-get install -y -qq curl
      curl -X POST -H 'Content-type: application/json' \
        --data "{
          \"attachments\": [
            {
              \"fallback\": \"[경고] 파이프라인 작업 실패\",
              \"color\": \"danger\",
              \"pretext\": \"❌ *사설망 파이프라인 실패 알림*\",
              \"title\": \"[위험] $CI_PROJECT_NAME 작업 비상 중단\",
              \"title_link\": \"$CI_PIPELINE_URL\",
              \"text\": \"파이프라인 실행 도중 에러가 발생하여 동기화 작업이 긴급 중단되었습니다. 상세 로그를 분석하여 조치하세요.\\n\\n🔗 *상세 빌드 로그 확인:* $CI_PIPELINE_URL\",
              \"footer\": \"Private GitLab-CI Engine\",
              \"ts\": $(date +%s)
            }
          ]
        }" $SLACK_WEBHOOK_URL