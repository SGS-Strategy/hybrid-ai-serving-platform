stages:
  - build-base
  - build-train
  - test-train
  - promote-train
  - notify

variables:
  HARBOR_REGISTRY: "harbor.intp.me"
  HARBOR_PROJECT: "images"         
  BASE_IMAGE_NAME: "base"           
  TRAIN_IMAGE_NAME: "train"         
  AWS_REGION: "ap-northeast-2"
  ECR_ENDPOINT: "808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/"
  ECR_API_URI: "808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/predictive-model"
  MINIO_ENDPOINT: "http://minio-api.minio-tenant.svc.cluster.local:9000"

before_script:
  - echo "--- [$(date)] '${CI_JOB_NAME}' 작업을 시작합니다. ---"

# ==============================================================================
# [동작 1] 학습 베이스 이미지 빌드 파이프라인 (코드가 수정되면 자동으로 즉시 가동!)
# ==============================================================================
build-base-image:
  stage: build-base
  image:
    # 🔗 [수정] Harbor 프록시를 거치지 않고 GCR 원본 디버그 이미지 경로로 교체
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - |
      echo "[LOG] Harbor 인증 수립 및 Kaniko 베이스 이미지 빌드 시작..."
      mkdir -p /kaniko/.docker
      echo '{"credsStore":"ecr-login"}' > /kaniko/.docker/config.json
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile.build" \
        --destination "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${BASE_IMAGE_NAME}:latest" \
        --registry-mirror=index.docker.io=harbor.intp.me/docker-hub
  tags:
    -  gpu-worker
  rules:
    # 🚀 [수정] yml 파일 자체를 포함해 빌드 관련 파일이 변경되어 push되면 무조건 자동 가동!
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - .gitlab-ci.yml
        - Dockerfile.build
        - requirements.txt
    - if: '$TRIGGER_PHASE == "build-base"'

# ==============================================================================
# [동작 2] 학습 완료 후 서빙 이미지 빌드, 검사 및 ECR 이송 파이프라인 (릴리즈 시 단독 실행)
# ==============================================================================

# 2-A. 패키징 단계 (MinIO 모델 다운로드 + Kaniko 서빙 이미지 빌드)
build-serving-image:
  stage: build-train
  image:
    # 🔗 [수정] 서빙 이미지 빌더 엔진도 동일하게 GCR 원본 경로로 정정
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - |
      echo "[LOG] MinIO 클라이언트(mc) 설치 및 모델 아티팩트 다운로드..."
      curl -k -fsSL -o /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc
      chmod +x /tmp/mc
      /tmp/mc alias set minio "${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"
      
      # MinIO artifacts/ 버킷에 저장된 최신 모델 파일을 서빙용 컨텍스트 내부로 복사
      mkdir -p "${CI_PROJECT_DIR}/services/inference-api/model-artifacts"
      /tmp/mc cp --recursive "minio/artifacts/models/latest/" "${CI_PROJECT_DIR}/services/inference-api/model-artifacts/"
      
      echo "[LOG] Harbor 인증 수립 및 Kaniko 서빙 이미지 빌드 시작..."
      mkdir -p /kaniko/.docker
      echo '{"credsStore":"ecr-login"}' > /kaniko/.docker/config.json
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/services/inference-api" \
        --dockerfile "${CI_PROJECT_DIR}/services/inference-api/Dockerfile" \
        --destination "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${TRAIN_IMAGE_NAME}:${CI_COMMIT_REF_NAME}" \
        --destination "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${TRAIN_IMAGE_NAME}:latest" \
        --registry-mirror=index.docker.io=harbor.intp.me/docker-hub
  tags:
    -  gpu-worker
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$TRIGGER_PHASE == "release-train"'

# 2-B. 검사 단계 (Trivy 사설 오프라인 스캔)
scan-serving-image:
  stage: test-train
  image:
    name: harbor.intp.me/docker-hub/aquasec/trivy:latest
    entrypoint: [""]
  script:
    - |
      echo "[LOG] 사설 이미지 보안 취약점 진단 -> /images/train"
      trivy image --severity HIGH,CRITICAL --exit-code 0 "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${TRAIN_IMAGE_NAME}:${CI_COMMIT_REF_NAME}"
  tags:
    -  gpu-worker
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$TRIGGER_PHASE == "release-train"'

# 2-C. 이송 단계 (AWS ECR 전송 및 GitOps 갱신)
promote-to-ecr:
  stage: promote-train
  image: harbor.intp.me/infra/mlops-tools:latest
  script:
    - |
      echo "[LOG] AWS ECR 로그인 및 이미지 이송(Promotion) 시작..."
      aws ecr get-login-password --region "${AWS_REGION}" | skopeo login --username AWS --password-stdin "${ECR_ENDPOINT}"
      
      # Harbor