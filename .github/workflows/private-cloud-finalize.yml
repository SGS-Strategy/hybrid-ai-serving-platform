name: Private Cloud Finalize

on:
  workflow_dispatch:
    inputs:
      validate_gpu:
        description: Run GPU passthrough validation jobs
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: private-cloud-foundation
  cancel-in-progress: false

jobs:
  finalize:
    name: Finalize
    uses: ./.github/workflows/private-cloud-remote.yml
    with:
      command: apply
      phases: finalize
      validate_gpu: ${{ inputs.validate_gpu }}
      do_checkout: true
      do_cleanup: true
    secrets: inherit
