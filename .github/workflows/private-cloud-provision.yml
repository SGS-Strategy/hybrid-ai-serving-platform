name: Private Cloud Provision

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Apply from existing DevStack or reinstall everything from DevStack
        required: true
        type: choice
        default: apply
        options:
          - apply
          - reinstall

permissions:
  contents: read

concurrency:
  group: private-cloud-foundation
  cancel-in-progress: false

jobs:
  provision:
    name: Provision
    uses: ./.github/workflows/private-cloud-remote.yml
    with:
      command: apply
      run_mode: ${{ inputs.run_mode }}
      phases: provision
      do_checkout: true
      do_cleanup: true
    secrets: inherit
