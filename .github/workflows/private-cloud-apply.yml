name: Private Cloud Apply

on:
  workflow_dispatch:
    inputs:
      force_cleanup:
        description: Recreate the local DevStack control plane before applying
        required: true
        type: boolean
        default: false
      setup_storage:
        description: Install MinIO and NFS storage after Kubernetes bootstrap
        required: true
        type: boolean
        default: true
      validate_gpu:
        description: Create isolated temporary OpenStack resources, validate GPU passthrough, then delete them
        required: true
        type: boolean
        default: false
      minio_volume_size:
        description: MinIO volume size per disk (Gi)
        required: true
        type: string
        default: "50"

permissions:
  contents: read

jobs:
  apply:
    name: Apply Foundation
    uses: ./.github/workflows/private-cloud-foundation.yml
    with:
      action: apply
      install_openstack: true
      bootstrap_kubernetes: true
      apply_kubernetes: true
      setup_storage: ${{ inputs.setup_storage }}
      minio_volume_size: ${{ inputs.minio_volume_size }}
      force_cleanup: ${{ inputs.force_cleanup }}
    secrets: inherit

  validate-gpu:
    name: Validate GPU Passthrough
    needs: apply
    if: ${{ inputs.validate_gpu }}
    uses: ./.github/workflows/private-cloud-gpu-validate.yml
    with:
      use_local_devstack: true
    secrets: inherit
