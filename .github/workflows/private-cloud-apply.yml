name: Private Cloud Apply

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Apply from existing DevStack or reinstall everything from DevStack
        required: true
        type: choice
        default: apply
        options:
          - apply
          - reinstall
      validate_gpu:
        description: Run GPU passthrough validation jobs
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  apply:
    name: Apply Foundation
    uses: ./.github/workflows/private-cloud-foundation.yml
    with:
      action: apply
      install_openstack: true
      devstack_mode: ${{ inputs.run_mode }}
      bootstrap_kubernetes: true
      apply_kubernetes: true
      setup_storage: true
      validate_gpu: ${{ inputs.validate_gpu }}
      minio_volume_size: "10"
      force_cleanup: ${{ inputs.run_mode == 'reinstall' }}
    secrets: inherit
