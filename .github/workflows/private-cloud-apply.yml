name: Private Cloud Apply

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Apply from existing DevStack or reinstall everything from DevStack
        required: true
        type: choice
        default: apply
        options:
          - apply
          - reinstall
      validate_gpu:
        description: Run GPU passthrough validation jobs
        required: true
        type: boolean
        default: false

permissions:
  contents: read

# Run-level exclusivity (shared with destroy and the phase workflows). Keep the
# full apply serialized so GitLab/Harbor bootstrap does not contend with k8s
# provisioning on the same OpenStack host.
concurrency:
  group: private-cloud-foundation
  cancel-in-progress: false

jobs:
  # Entry job: pins the host commit, then runs tools/devstack/images/terraform.
  provision:
    name: Provision
    uses: ./.github/workflows/private-cloud-remote.yml
    with:
      command: apply
      run_mode: ${{ inputs.run_mode }}
      phases: provision
      do_checkout: true
      do_cleanup: false
    secrets: inherit

  # Kubernetes chain: bootstrap → storage → model-build platform.
  platform:
    name: Platform (k8s)
    needs: provision
    uses: ./.github/workflows/private-cloud-remote.yml
    with:
      command: apply
      run_mode: ${{ inputs.run_mode }}
      phases: platform
      do_checkout: false
      do_cleanup: false
    secrets: inherit

  # Registry services: gitlab and harbor. Keep this after platform to avoid
  # overlapping VM/disk-heavy bootstrap work on the same host.
  registry:
    name: Registry (gitlab + harbor)
    needs: platform
    uses: ./.github/workflows/private-cloud-remote.yml
    with:
      command: apply
      run_mode: ${{ inputs.run_mode }}
      phases: registry
      do_checkout: false
      do_cleanup: false
    secrets: inherit

  # Final job: optional GPU validation, then restore the host git ref and clean env files.
  finalize:
    name: Finalize
    needs: [platform, registry]
    if: always()
    uses: ./.github/workflows/private-cloud-remote.yml
    with:
      command: apply
      run_mode: ${{ inputs.run_mode }}
      phases: finalize
      validate_gpu: ${{ inputs.validate_gpu }}
      do_checkout: false
      do_cleanup: true
    secrets: inherit
