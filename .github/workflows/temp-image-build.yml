# predictive-model 이미지를 빌드하고 Amazon ECR에 푸시하는 워크플로우 (임시)
# temp/ 폴더 기반 - 프라이빗 파이프라인 검증용

name: Predictive Model Image Build (Temp)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: predictive-model

concurrency:
  group: predictive-model-image-dispatch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          docker build \
            -f temp/Dockerfile.predictor \
            -t "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ inputs.image_tag }}" \
            temp/
          docker push "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ inputs.image_tag }}"
