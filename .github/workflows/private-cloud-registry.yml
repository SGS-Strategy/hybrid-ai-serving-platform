name: Private Cloud Registry

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: private-cloud-foundation
  cancel-in-progress: false

jobs:
  registry:
    name: Registry (gitlab + harbor)
    uses: ./.github/workflows/private-cloud-remote.yml
    with:
      command: apply
      phases: registry
      do_checkout: true
      do_cleanup: true
    secrets: inherit
