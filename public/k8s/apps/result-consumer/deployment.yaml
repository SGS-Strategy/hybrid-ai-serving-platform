apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-consumer
  namespace: hasp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result-consumer
  template:
    metadata:
      labels:
        app: result-consumer
    spec:
      containers:
        - name: result-consumer
          image: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/result-consumer:latest
