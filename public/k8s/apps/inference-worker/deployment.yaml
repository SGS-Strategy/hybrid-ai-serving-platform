apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-worker
  namespace: hasp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-worker
  template:
    metadata:
      labels:
        app: inference-worker
    spec:
      containers:
        - name: inference-worker
          image: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com/inference-worker:latest
