apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: sre-slack-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: sre-monitoring
spec:
  route:
    receiver: infra-alerts
    groupBy: ['alertname', 'namespace', 'severity', 'plane']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
      - receiver: slo-alerts
        matchers:
          - name: team
            matchType: "="
            value: sre
  receivers:
    - name: infra-alerts
      slackConfigs:
        - apiURL:
            name: slack-webhooks
            key: infra
          channel: '#infra-alerts'
          color: '{{ if eq .Status "resolved" }}good{{ else if eq .GroupLabels.severity "critical" }}danger{{ else }}warning{{ end }}'
          title: '{{ if eq .Status "resolved" }}✅ *[RESOLVED][{{ .GroupLabels.plane }}]* {{ (index .Alerts 0).Annotations.summary }}{{ else if eq .GroupLabels.severity "critical" }}🚨 *[CRITICAL][{{ .GroupLabels.plane }}]* {{ (index .Alerts 0).Annotations.summary }}{{ else }}⚠️ *[WARNING][{{ .GroupLabels.plane }}]* {{ (index .Alerts 0).Annotations.summary }}{{ end }}'
          text: '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'
          sendResolved: true
    - name: slo-alerts
      slackConfigs:
        - apiURL:
            name: slack-webhooks
            key: slo
          channel: '#slo-alerts'
          color: '{{ if eq .Status "resolved" }}good{{ else if eq .GroupLabels.severity "critical" }}danger{{ else }}warning{{ end }}'
          title: '{{ if eq .Status "resolved" }}✅ *[RESOLVED]* {{ (index .Alerts 0).Annotations.summary }}{{ else if eq .GroupLabels.severity "critical" }}🚨 *[CRITICAL]* {{ (index .Alerts 0).Annotations.summary }}{{ else }}⚠️ *[WARNING]* {{ (index .Alerts 0).Annotations.summary }}{{ end }}'
          text: '{{ range .Alerts }}{{ .Annotations.description }}{{ "\n" }}{{ end }}'
          sendResolved: true
